<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontastic Find</title>
<style>
  :root{
    --bg:#f3e9cf; --card:#f7f0dc; --panel:#efe4c6; --ink:#2a2620; --ink-soft:#4c463c; --ink-body:#37322b;
    --gold:#b3892f; --gold-bright:#c8a13a; --gold-deep:#6d5417; --wax:#8a2e22; --rule:#cdb684;
    --shadow:rgba(32,26,18,.16); --ok:#4a7a4a;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --zoom:1;
  }
  body.dark{ --bg:#211d19; --card:#2b2723; --panel:#1c1915; --ink:#f2e9cf; --ink-soft:#c8bd9f; --ink-body:#e5dbc0; --rule:#4a4034; --shadow:rgba(0,0,0,.4); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink-body);background:var(--bg);-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
  .ln{font-synthesis:none} /* never fake a weight or italic — show the truth */

  /* ===== TOOLBAR ===== */
  .bar{position:sticky;top:0;z-index:30;background:rgba(43,39,35,.98);backdrop-filter:blur(6px);border-bottom:2px solid var(--gold);box-shadow:0 3px 16px rgba(20,16,10,.3);padding:10px 20px;display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .brand{color:var(--gold-bright);font-weight:800;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;white-space:nowrap}
  .lbl{color:#d8cba8;font-size:.72rem;letter-spacing:.04em;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  input[type=text]{font-family:var(--sans);font-size:.9rem;padding:7px 11px;border-radius:5px;border:1px solid var(--gold-deep);background:#f7f0dc;color:#2a2620}
  input#q{width:140px}
  input:focus,select:focus{outline:2px solid var(--gold-bright);outline-offset:1px}
  input[type=range]{accent-color:var(--gold-bright);width:110px}
  select{font-family:var(--sans);font-size:.78rem;padding:6px 8px;border-radius:5px;border:1px solid var(--gold-deep);background:#f7f0dc;color:#2a2620}
  .btn{font-family:var(--sans);font-size:.72rem;color:#e7dcc0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:6px 10px;cursor:pointer;white-space:nowrap}
  .btn:hover{background:var(--gold);color:#241f1a;border-color:var(--gold)}
  .btn.accent{background:var(--gold-bright);color:#241f1a;border-color:var(--gold-bright);font-weight:700}
  .btn.accent:hover{background:#fff;border-color:#fff}
  .chip{font-family:var(--sans);font-size:.72rem;color:#e7dcc0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 11px;cursor:pointer;user-select:none;white-space:nowrap;transition:background .12s,color .12s}
  .chip:hover{background:rgba(255,255,255,.14)}
  .chip.on{background:var(--gold);color:#241f1a;border-color:var(--gold);font-weight:700}
  .count{color:#c9bd9d;font-size:.72rem;white-space:nowrap;margin-left:auto}
  .divider{width:1px;height:20px;background:rgba(255,255,255,.18)}

  /* ===== SPECIMEN EDITOR ===== */
  .editor{display:none;background:var(--panel);border-bottom:1px solid var(--rule);padding:14px 20px;overflow-x:auto}
  .editor.on{display:block}
  .editor h3{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
  body.dark .editor h3{color:var(--gold-bright)}
  .lnhead,.lnrow{display:grid;grid-template-columns:24px 24px minmax(150px,1fr) 54px 66px 54px 30px 36px 30px 30px;gap:7px;align-items:center;min-width:640px}
  .lnrow{margin-bottom:7px}
  .lnhead{margin:2px 0 9px;font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
  .lnhead span{text-align:center;white-space:nowrap;overflow:hidden}
  .lnhead .htext{text-align:left;padding-left:2px}
  .lnrow input.lt{width:100%;min-width:0;font-size:.85rem;padding:6px 10px;border:1px solid var(--rule);border-radius:5px;background:var(--card);color:var(--ink)}
  .lnrow .num{width:100%;font-size:.8rem;padding:6px;border:1px solid var(--rule);border-radius:5px;background:var(--card);color:var(--ink);text-align:center}
  .lnrow select.wsel{width:100%;font-size:.76rem;padding:6px;border:1px solid var(--rule);border-radius:5px;background:var(--card);color:var(--ink)}
  .tg{font-family:var(--sans);font-size:.72rem;font-weight:700;width:100%;height:30px;border:1px solid var(--rule);border-radius:5px;background:var(--card);color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .tg.on{background:var(--gold);color:#241f1a;border-color:var(--gold)}
  .tg.i{font-style:italic}
  .mv{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:.9rem;padding:2px 0;border-radius:4px;width:100%;text-align:center}
  .mv:hover{color:var(--wax);background:rgba(179,137,47,.14)}
  .editor .addln{margin-top:6px;font-size:.74rem;color:var(--gold-deep);background:transparent;border:1px dashed var(--rule);border-radius:6px;padding:7px 12px;cursor:pointer}
  body.dark .editor .addln{color:var(--gold-bright)}
  .editor .addln:hover{background:rgba(179,137,47,.12)}

  /* ===== PAIRING BANNER ===== */
  .pairbar{display:none;align-items:center;gap:11px;background:linear-gradient(90deg,rgba(179,137,47,.22),rgba(138,46,34,.16));border:1px solid var(--gold);border-radius:7px;padding:8px 14px;margin:12px 20px -4px}
  .pairbar.on{display:flex}
  .pairbar .pf{font-weight:700;color:var(--ink)}
  .pairbar .btn2{font-family:var(--sans);font-size:.72rem;border:1px solid var(--gold-deep);background:var(--card);color:var(--ink);border-radius:5px;padding:5px 10px;cursor:pointer}
  .pairbar .btn2:hover{background:var(--gold);color:#241f1a}

  /* ===== GRID ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;padding:18px 20px 40px;max-width:1560px;margin:0 auto}
  .fc{background:var(--card);border:1px solid var(--rule);border-radius:10px;padding:14px 17px 15px;box-shadow:0 2px 9px var(--shadow);display:flex;flex-direction:column}
  .fc .top{display:flex;align-items:center;gap:7px;margin-bottom:11px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
  .fc .name{font-family:var(--sans);font-weight:700;font-size:.84rem;color:var(--ink);text-decoration:none}
  .fc .name:hover{color:var(--wax);text-decoration:underline}
  .fc .meta{font-family:var(--sans);font-size:.58rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);white-space:nowrap}
  .tag{font-size:.55rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:10px;white-space:nowrap}
  .tag.cat{background:rgba(179,137,47,.2);color:var(--gold-deep)}
  body.dark .tag.cat{color:var(--gold-bright)}
  .tag.i-y{background:var(--ok);color:#fff}
  .tag.i-n{background:rgba(138,46,34,.16);color:var(--wax)}
  body.dark .tag.i-n{color:#e2a99f}
  .spacer{flex:1}
  .act{cursor:pointer;font-size:.92rem;line-height:1;padding:3px;border-radius:5px;user-select:none;background:none;border:none;color:inherit;opacity:.5}
  .act:hover{opacity:1;background:rgba(179,137,47,.16)}
  .act.on{opacity:1}
  .act.star.on{color:var(--gold-bright)}
  .act.short.on{color:var(--wax)}
  body.dark .act.short.on{color:#e2a99f}
  .specimen{display:flex;flex-direction:column;gap:11px}
  .ln{color:var(--ink);line-height:1.25;word-break:break-word}
  .foot{display:flex;gap:8px;margin-top:12px;opacity:0;transition:opacity .12s}
  .fc:hover .foot{opacity:1}
  .foot button{font-family:var(--sans);font-size:.66rem;letter-spacing:.03em;border:1px solid var(--rule);background:transparent;color:var(--ink-soft);border-radius:5px;padding:5px 9px;cursor:pointer}
  .foot button:hover{border-color:var(--gold);color:var(--wax);background:rgba(179,137,47,.1)}
  body.dark .foot button:hover{color:var(--gold-bright)}

  .empty{grid-column:1/-1;text-align:center;color:var(--ink-soft);padding:60px 20px;font-size:.95rem}
  .managepanel{margin:8px 20px 0;padding:11px 15px;background:var(--card);border:1px dashed var(--rule);border-radius:8px;display:none;flex-wrap:wrap;gap:8px;align-items:center}
  .managepanel.on{display:flex}
  .managepanel .h{font-size:.72rem;color:var(--ink-soft);font-weight:700;margin-right:6px}
  .bchip{font-size:.72rem;background:rgba(138,46,34,.12);color:var(--wax);border:1px solid var(--rule);border-radius:16px;padding:4px 10px;cursor:pointer}
  body.dark .bchip{color:#e2a99f}
  .bchip:hover{background:var(--wax);color:#fff}

  footer{text-align:center;padding:22px;border-top:1px solid var(--rule);color:var(--ink-soft);font-size:.72rem;line-height:1.6}
  footer a{color:var(--wax)}
  body.dark footer a{color:var(--gold-bright)}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#f6ecd4;font-size:.82rem;padding:10px 20px;border-radius:24px;box-shadow:0 6px 24px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  body.dark #toast{background:#000}

  @media(max-width:600px){
    .grid{grid-template-columns:1fr;padding:14px 12px 30px}
    .bar{padding:9px 12px}
    .count{margin-left:0;width:100%}
    input#q{width:100%}
    .lnrow input.lt{min-width:120px}
  }
</style>
</head>
<body>

<div class="bar">
  <div class="row">
    <span class="brand">✦ Fontastic Find</span>
    <span class="lbl">Project</span>
    <select id="projsel"></select>
    <button class="btn" id="p-new">＋ new</button>
    <button class="btn" id="p-rename">rename</button>
    <button class="btn" id="p-dup">duplicate</button>
    <button class="btn" id="p-del">delete</button>
    <div class="divider"></div>
    <button class="btn" id="p-edit">✎ edit specimen</button>
    <button class="btn" id="p-export">export</button>
    <button class="btn" id="p-import">import</button>
    <input type="file" id="importfile" accept="application/json" hidden>
    <a class="btn accent" href="compare.html" style="text-decoration:none" title="Compare font pairings side by side">⇄ Pairing Lab</a>
  </div>
  <div class="row">
    <input id="q" type="text" placeholder="search name…" spellcheck="false">
    <div class="divider"></div>
    <div id="cats" class="row" style="gap:6px"></div>
    <div class="divider"></div>
    <span class="chip" data-f="italOnly">italic only</span>
    <span class="chip" data-f="varOnly">variable</span>
    <span class="lbl">weights ≥
      <select id="minw"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="6">6</option></select>
    </span>
    <span class="chip" data-f="hideOver">hide overused</span>
    <div class="divider"></div>
    <span class="chip" data-f="favOnly">★ favorites</span>
    <span class="chip" data-f="shortOnly">⚑ shortlist</span>
    <div class="divider"></div>
    <span class="lbl">sort
      <select id="sort"><option value="popular">popular</option><option value="rarest">rarest first</option><option value="az">A–Z</option></select>
    </span>
    <span class="lbl">zoom <input id="zoom" type="range" min="0.7" max="1.7" step="0.05" value="1"></span>
    <span class="chip" id="darkt">◐ dark</span>
    <span class="chip" id="hiddent"></span>
    <span class="chip" id="blockedt"></span>
    <span class="count" id="count"></span>
  </div>
</div>

<div class="editor" id="editor"></div>
<div class="managepanel" id="managepanel"></div>
<div class="managepanel" id="hiddenpanel"></div>
<div class="pairbar" id="pairbar">
  <span class="lbl" style="color:var(--ink-soft)">Pairing body font:</span>
  <span class="pf" id="pairname"></span>
  <button class="btn2" id="paircopy">Copy body code</button>
  <button class="btn2" id="pairclear">Clear</button>
</div>

<div class="grid" id="grid"></div>
<div id="sentinel" style="height:1px"></div>
<footer>
  Font metadata &amp; the fonts themselves come from <a href="https://fonts.google.com" target="_blank" rel="noopener">Google Fonts</a> (OFL / Apache licensed). Catalog snapshot: <span id="snapdate"></span>. · Tool code MIT.
</footer>
<div id="toast"></div>

<script src="fonts-data.js"></script>
<script>
(function(){
  const grid = document.getElementById("grid");
  if(typeof GFONTS === "undefined"){
    grid.innerHTML = '<div class="empty">Could not load <b>fonts-data.js</b>. Keep it in the same folder as this file — or open this page through a local server.</div>';
    return;
  }
  document.getElementById("snapdate").textContent = (window.GFONTS_UPDATED||"");
  const BY_NAME = {}; GFONTS.forEach(x=>BY_NAME[x.f]=x);
  const OVERUSED_MAX = 50, CHUNK = 60;
  const CATS = [["serif","Serif"],["display","Display"],["sans","Sans"],["hand","Script"],["mono","Mono"]];
  const WEIGHTS = [100,200,300,400,500,600,700,800,900];

  const LS = {
    get:(k,d)=>{ try{ const v=JSON.parse(localStorage.getItem("fe_"+k)); return v==null?d:v; }catch(e){ return d; } },
    set:(k,v)=>localStorage.setItem("fe_"+k, JSON.stringify(v))
  };

  // ---------- persisted state ----------
  let favs = new Set(LS.get("favs",[]));
  let blocked = new Set(LS.get("blocked",["Fraunces"]));
  function newLine(o){ return Object.assign({text:"Sample text",size:28,weight:400,italic:false,caps:false,body:false,track:0}, o||{}); }
  const SEED = [
    { id:"default", name:"Default", bodyFont:null, shortlist:[], hidden:[], lines:[
      newLine({text:"The Northern Lights", size:46, weight:400}),
      newLine({text:"Chapter One", size:26, weight:600}),
      newLine({text:"a quiet beginning", size:20, italic:true}),
      newLine({text:"Pack my box with five dozen liquor jugs and a quart of aged whiskey.", size:16, body:true}),
      newLine({text:"Table of Contents", size:13, weight:500, caps:true})
    ]}
  ];
  let projects = LS.get("projects", SEED);
  let activeId = LS.get("active", projects[0].id);
  let editorOpen = LS.get("editorOpen", true);
  function proj(){ return projects.find(p=>p.id===activeId) || projects[0]; }
  function saveProjects(){ LS.set("projects",projects); LS.set("active",activeId); }

  // ---------- transient filter state ----------
  const state = { q:"", cats:new Set(), italOnly:false, varOnly:false, minW:1, hideOver:false, favOnly:false, shortOnly:false, sort:"popular" };

  // ---------- font loading (weight-aware, lazy, deduped) ----------
  const loaded = new Set();
  function famParam(x){
    const nm = x.f.replace(/ /g,"+");
    if(x.v){
      const [a,b] = x.wr || [400,700];
      return x.i ? nm+`:ital,wght@0,${a}..${b};1,${a}..${b}` : nm+`:wght@${a}..${b}`;
    }
    const ws = x.w.length ? x.w : [400];
    if(x.i) return nm+":ital,wght@"+ws.map(w=>"0,"+w).concat(ws.map(w=>"1,"+w)).join(";");
    return nm+":wght@"+ws.join(";");
  }
  function loadFont(x){
    if(!x || loaded.has(x.f)) return;
    loaded.add(x.f);
    const l = document.createElement("link");
    l.rel = "stylesheet";
    l.href = "https://fonts.googleapis.com/css2?family=" + famParam(x) + "&display=swap";
    document.head.appendChild(l);
  }

  // ---------- filtering / sorting ----------
  function compute(){
    const q = state.q.toLowerCase(), p = proj();
    const short = new Set(p.shortlist||[]), hid = new Set(p.hidden||[]);
    let list = GFONTS.filter(x=>{
      if(blocked.has(x.f)) return false;
      if(hid.has(x.f)) return false;
      if(state.favOnly && !favs.has(x.f)) return false;
      if(state.shortOnly && !short.has(x.f)) return false;
      if(state.cats.size && !state.cats.has(x.c)) return false;
      if(state.italOnly && !x.i) return false;
      if(state.varOnly && !x.v) return false;
      const wc = x.v ? Math.max(x.w.length, 8) : x.w.length;
      if(wc < state.minW) return false;
      if(state.hideOver && x.p <= OVERUSED_MAX) return false;
      if(q && x.f.toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
    if(state.sort==="popular") list.sort((a,b)=>a.p-b.p);
    else if(state.sort==="rarest") list.sort((a,b)=>b.p-a.p);
    else list.sort((a,b)=>a.f.localeCompare(b.f));
    return list;
  }

  // ---------- rendering ----------
  let filtered = [], ptr = 0;
  function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function weightMeta(x){ return x.v ? ("var "+(x.wr?x.wr[0]+"–"+x.wr[1]:"")) : (x.w.length+" wt"); }

  function buildSpecimen(x){
    const p = proj();
    return p.lines.map(ln=>{
      const useBody = ln.body && p.bodyFont;
      const fam = useBody ? p.bodyFont : x.f;
      const st = "font-family:'"+fam+"';font-weight:"+ln.weight+";font-style:"+(ln.italic?"italic":"normal")
               + ";text-transform:"+(ln.caps?"uppercase":"none")+";letter-spacing:"+(ln.track||0)+"em;font-size:calc("+ln.size+"px * var(--zoom))";
      return '<div class="ln" style="'+st+'">'+(esc(ln.text)||"&nbsp;")+'</div>';
    }).join("");
  }

  function makeCard(x){
    const el = document.createElement("div");
    el.className = "fc"; el._font = x;
    const catName = (CATS.find(c=>c[0]===x.c)||[,x.c])[1];
    const inShort = (proj().shortlist||[]).indexOf(x.f)!==-1;
    el.innerHTML =
      '<div class="top">'+
        '<a class="name" href="https://fonts.google.com/specimen/'+x.f.replace(/ /g,"+")+'" target="_blank" rel="noopener">'+esc(x.f)+'</a>'+
        '<span class="tag cat">'+catName+'</span>'+
        '<span class="tag '+(x.i?"i-y":"i-n")+'">'+(x.i?"italic":"no ital")+'</span>'+
        '<span class="meta">'+weightMeta(x)+'</span>'+
        '<span class="spacer"></span>'+
        '<button class="act star'+(favs.has(x.f)?" on":"")+'" title="favorite (global)">'+(favs.has(x.f)?"★":"☆")+'</button>'+
        '<button class="act short'+(inShort?" on":"")+'" title="shortlist (this project)">'+(inShort?"⚑":"⚐")+'</button>'+
        '<button class="act hide" title="hide from this project only">✕</button>'+
        '<button class="act block" title="block everywhere (all projects)">⊘</button>'+
      '</div>'+
      '<div class="specimen">'+buildSpecimen(x)+'</div>'+
      '<div class="foot">'+
        '<button class="setbody">use as body →</button>'+
        '<button class="copy">copy code</button>'+
      '</div>';
    const star = el.querySelector(".star"), short = el.querySelector(".short");
    star.onclick = ()=>{ toggleFav(x.f); star.classList.toggle("on",favs.has(x.f)); star.textContent=favs.has(x.f)?"★":"☆"; };
    short.onclick = ()=>{ const on=toggleShort(x.f); short.classList.toggle("on",on); short.textContent=on?"⚑":"⚐"; };
    el.querySelector(".hide").onclick = ()=>{ const p=proj(); p.hidden=p.hidden||[]; if(p.hidden.indexOf(x.f)===-1)p.hidden.push(x.f); saveProjects(); el.remove(); dropFromView(x.f); updateHiddenBtn(); toast("Hidden from "+p.name); };
    el.querySelector(".block").onclick = ()=>{ blocked.add(x.f); LS.set("blocked",[...blocked]); el.remove(); dropFromView(x.f); updateBlockedBtn(); toast("Blocked "+x.f); };
    el.querySelector(".setbody").onclick = ()=>setBody(x.f);
    el.querySelector(".copy").onclick = ()=>copyCode(x);
    return el;
  }

  function renderReset(){
    filtered = compute(); ptr = 0; grid.innerHTML = "";
    document.getElementById("count").textContent = filtered.length.toLocaleString() + " faces";
    if(!filtered.length){ grid.innerHTML = '<div class="empty">No faces match these filters.</div>'; return; }
    renderMore();
  }
  function renderMore(){
    const slice = filtered.slice(ptr, ptr+CHUNK), frag = document.createDocumentFragment();
    slice.forEach(x=>{ frag.appendChild(makeCard(x)); loadFont(x); }); // eager per-chunk load (no IO dependency)
    grid.appendChild(frag); ptr += slice.length;
  }
  // rebuild specimens of already-rendered cards without recompute / scroll reset
  function refreshSpecimens(){ grid.querySelectorAll(".fc").forEach(el=>{ const s=el.querySelector(".specimen"); if(s) s.innerHTML=buildSpecimen(el._font); }); }
  // remove a font from the working list after hide/block (keeps count honest + prevents scroll-reappear), no full recompute
  function dropFromView(name){ const i=filtered.findIndex(z=>z.f===name); if(i!==-1){ filtered.splice(i,1); if(i<ptr) ptr--; document.getElementById("count").textContent=filtered.length.toLocaleString()+" faces"; } }

  // infinite scroll — IO where available, plus a scroll fallback so pagination never stalls
  try{ new IntersectionObserver((entries)=>{ if(entries[0].isIntersecting && ptr < filtered.length) renderMore(); }, {rootMargin:"700px"}).observe(document.getElementById("sentinel")); }catch(e){}
  window.addEventListener("scroll",()=>{ if(ptr < filtered.length && (window.innerHeight+window.scrollY) > document.body.offsetHeight-900) renderMore(); }, {passive:true});

  // ---------- keep: favorites / shortlist / block / body ----------
  function toggleFav(name){ favs.has(name)?favs.delete(name):favs.add(name); LS.set("favs",[...favs]); }
  function toggleShort(name){ const p=proj(); p.shortlist=p.shortlist||[]; const i=p.shortlist.indexOf(name); if(i===-1)p.shortlist.push(name); else p.shortlist.splice(i,1); saveProjects(); return i===-1; }
  function setBody(name){ const p=proj(); p.bodyFont=name; saveProjects(); loadFont(BY_NAME[name]); refreshPairbar(); refreshSpecimens(); toast("Body font: "+name); }
  function refreshPairbar(){
    const pb=document.getElementById("pairbar"), p=proj();
    if(p.bodyFont){ pb.classList.add("on"); const n=document.getElementById("pairname"); n.textContent=p.bodyFont; n.style.fontFamily="'"+p.bodyFont+"'"; }
    else pb.classList.remove("on");
  }
  document.getElementById("pairclear").onclick=()=>{ proj().bodyFont=null; saveProjects(); refreshPairbar(); refreshSpecimens(); };
  document.getElementById("paircopy").onclick=()=>{ const p=proj(); if(p.bodyFont) copy("/* Body */\n"+link(p.bodyFont,true)+"\nfont-family: '"+p.bodyFont+"', serif;", "Copied "+p.bodyFont+" (body) code"); };

  function link(name,ital){ return '<link href="https://fonts.googleapis.com/css2?family='+name.replace(/ /g,"+")+(ital?":ital,wght@0,400;1,400":"")+'&display=swap" rel="stylesheet">'; }
  function copyCode(x){
    const fb = (x.c==="serif"||x.c==="display")?"serif":x.c==="mono"?"monospace":"sans-serif";
    copy(link(x.f,x.i)+"\n/* CSS */\nfont-family: '"+x.f+"', "+fb+";", "Copied "+x.f+" embed code");
  }
  function copy(txt,msg){ navigator.clipboard.writeText(txt).then(()=>toast(msg),()=>toast("Copy failed — select & copy manually")); }

  // ---------- specimen editor ----------
  const editor = document.getElementById("editor");
  function renderEditor(){
    const p = proj();
    let h = '<h3>Specimen lines · '+esc(p.name)+'</h3>';
    h += '<div class="lnhead"><span></span><span></span><span class="htext">text</span><span>size</span><span>weight</span><span>track</span><span>ital</span><span>caps</span><span>body</span><span></span></div>';
    p.lines.forEach((ln,i)=>{
      h += '<div class="lnrow" data-i="'+i+'">'+
        '<button class="mv up" title="move up">▲</button><button class="mv dn" title="move down">▼</button>'+
        '<input class="lt" type="text" value="'+esc(ln.text)+'">'+
        '<input class="num" type="number" min="8" max="120" value="'+ln.size+'" title="size (px)">'+
        '<select class="wsel" title="weight">'+WEIGHTS.map(w=>'<option value="'+w+'"'+(w===ln.weight?" selected":"")+'>'+w+'</option>').join("")+'</select>'+
        '<input class="num trk" type="number" step="0.01" min="-0.1" max="0.4" value="'+(ln.track||0)+'" title="tracking / letter-spacing (em)">'+
        '<button class="tg i itg'+(ln.italic?" on":"")+'" title="italic">I</button>'+
        '<button class="tg captg'+(ln.caps?" on":"")+'" title="ALL CAPS">AA</button>'+
        '<button class="tg bodytg'+(ln.body?" on":"")+'" title="Body line: renders in the font you locked with ‘use as body →’">¶</button>'+
        '<button class="mv del" title="delete line">✕</button>'+
      '</div>';
    });
    h += '<button class="addln">＋ add line</button>';
    editor.innerHTML = h;
    editor.querySelectorAll(".lnrow").forEach(row=>{
      const i = +row.dataset.i, ln = p.lines[i];
      row.querySelector(".lt").oninput = e=>{ ln.text=e.target.value; saveProjects(); refreshSpecimens(); };
      row.querySelector(".num").onchange = e=>{ ln.size=Math.max(8,Math.min(120,+e.target.value||16)); saveProjects(); refreshSpecimens(); };
      row.querySelector(".wsel").onchange = e=>{ ln.weight=+e.target.value; saveProjects(); refreshSpecimens(); };
      row.querySelector(".trk").onchange = e=>{ ln.track=parseFloat(e.target.value)||0; saveProjects(); refreshSpecimens(); };
      row.querySelector(".itg").onclick = e=>{ ln.italic=!ln.italic; e.target.classList.toggle("on",ln.italic); saveProjects(); refreshSpecimens(); };
      row.querySelector(".captg").onclick = e=>{ ln.caps=!ln.caps; e.target.classList.toggle("on",ln.caps); saveProjects(); refreshSpecimens(); };
      row.querySelector(".bodytg").onclick = e=>{ ln.body=!ln.body; e.target.classList.toggle("on",ln.body); saveProjects(); refreshSpecimens(); };
      row.querySelector(".up").onclick = ()=>{ if(i>0){ p.lines.splice(i-1,0,p.lines.splice(i,1)[0]); saveProjects(); renderEditor(); refreshSpecimens(); } };
      row.querySelector(".dn").onclick = ()=>{ if(i<p.lines.length-1){ p.lines.splice(i+1,0,p.lines.splice(i,1)[0]); saveProjects(); renderEditor(); refreshSpecimens(); } };
      row.querySelector(".del").onclick = ()=>{ p.lines.splice(i,1); saveProjects(); renderEditor(); refreshSpecimens(); };
    });
    editor.querySelector(".addln").onclick = ()=>{ p.lines.push(newLine({text:"New line"})); saveProjects(); renderEditor(); refreshSpecimens(); };
  }
  document.getElementById("p-edit").onclick=()=>{ const on=editor.classList.toggle("on"); LS.set("editorOpen",on); if(on) renderEditor(); };

  // ---------- projects ----------
  function renderProjSel(){
    const sel=document.getElementById("projsel");
    sel.innerHTML = projects.map(p=>'<option value="'+p.id+'"'+(p.id===activeId?" selected":"")+'>'+esc(p.name)+'</option>').join("");
  }
  function switchProject(id){ activeId=id; saveProjects(); renderProjSel(); if(editor.classList.contains("on"))renderEditor(); refreshPairbar(); updateHiddenBtn(); document.getElementById("hiddenpanel").classList.remove("on"); if(proj().bodyFont)loadFont(BY_NAME[proj().bodyFont]); renderReset(); }
  document.getElementById("projsel").onchange = e=>switchProject(e.target.value);
  document.getElementById("p-new").onclick=()=>{ const n=prompt("New project name:"); if(!n)return; const pr={id:"p"+Date.now(),name:n,bodyFont:null,shortlist:[],hidden:[],lines:[newLine({text:"The Northern Lights",size:44}),newLine({text:"a quiet beginning",size:19,italic:true}),newLine({text:"Pack my box with five dozen liquor jugs.",size:16,body:true})]}; projects.push(pr); switchProject(pr.id); };
  document.getElementById("p-rename").onclick=()=>{ const n=prompt("Rename project:",proj().name); if(n){ proj().name=n; saveProjects(); renderProjSel(); if(editor.classList.contains("on"))renderEditor(); } };
  document.getElementById("p-dup").onclick=()=>{ const c=JSON.parse(JSON.stringify(proj())); c.id="p"+Date.now(); c.name=proj().name+" copy"; projects.push(c); switchProject(c.id); };
  document.getElementById("p-del").onclick=()=>{ if(projects.length<2){toast("Keep at least one project");return;} if(!confirm("Delete project \""+proj().name+"\"?"))return; projects=projects.filter(p=>p.id!==activeId); activeId=projects[0].id; saveProjects(); renderProjSel(); renderReset(); refreshPairbar(); if(editor.classList.contains("on"))renderEditor(); };
  document.getElementById("p-export").onclick=()=>{ const blob=new Blob([JSON.stringify(proj(),null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=proj().name.replace(/[^a-z0-9]+/gi,"-").toLowerCase()+".json"; a.click(); toast("Exported "+proj().name); };
  document.getElementById("p-import").onclick=()=>document.getElementById("importfile").click();
  document.getElementById("importfile").onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const o=JSON.parse(r.result); if(!o.lines)throw 0; o.id="p"+Date.now(); o.name=(o.name||"Imported")+""; o.shortlist=o.shortlist||[]; o.hidden=o.hidden||[]; projects.push(o); switchProject(o.id); toast("Imported "+o.name); }catch(err){ toast("Not a valid project file"); } }; r.readAsText(f); e.target.value=""; };

  // ---------- per-project hidden manager ----------
  function updateHiddenBtn(){ document.getElementById("hiddent").textContent="✕ hidden ("+(proj().hidden||[]).length+")"; }
  document.getElementById("hiddent").onclick=()=>{
    const pnl=document.getElementById("hiddenpanel"); pnl.classList.toggle("on");
    if(pnl.classList.contains("on")){
      const p=proj(); pnl.innerHTML='<span class="h">Hidden from '+esc(p.name)+' — click to restore:</span>';
      const hid=(p.hidden||[]);
      if(!hid.length) pnl.innerHTML+='<span class="lbl" style="color:var(--ink-soft)">none</span>';
      [...hid].sort().forEach(name=>{ const c=document.createElement("span"); c.className="bchip"; c.textContent=name+" ✕";
        c.onclick=()=>{ p.hidden=p.hidden.filter(n=>n!==name); saveProjects(); updateHiddenBtn(); c.remove(); renderReset(); }; pnl.appendChild(c); });
    }
  };

  // ---------- blocked manager ----------
  function updateBlockedBtn(){ document.getElementById("blockedt").textContent="⊘ blocked ("+blocked.size+")"; }
  document.getElementById("blockedt").onclick=()=>{
    const pnl=document.getElementById("managepanel"); pnl.classList.toggle("on");
    if(pnl.classList.contains("on")){
      pnl.innerHTML='<span class="h">Blocked — click to unblock:</span>';
      if(!blocked.size) pnl.innerHTML+='<span class="lbl" style="color:var(--ink-soft)">none</span>';
      [...blocked].sort().forEach(name=>{ const c=document.createElement("span"); c.className="bchip"; c.textContent=name+" ✕";
        c.onclick=()=>{ blocked.delete(name); LS.set("blocked",[...blocked]); updateBlockedBtn(); c.remove(); renderReset(); }; pnl.appendChild(c); });
    }
  };

  // ---------- wire filters ----------
  document.getElementById("q").addEventListener("input",e=>{ state.q=e.target.value; renderReset(); });
  document.getElementById("minw").addEventListener("change",e=>{ state.minW=+e.target.value; renderReset(); });
  document.getElementById("sort").addEventListener("change",e=>{ state.sort=e.target.value; renderReset(); });
  document.getElementById("zoom").addEventListener("input",e=>{ document.documentElement.style.setProperty("--zoom",e.target.value); });
  document.getElementById("darkt").addEventListener("click",e=>{ document.body.classList.toggle("dark"); e.target.classList.toggle("on"); });
  document.querySelectorAll(".chip[data-f]").forEach(chip=>{ chip.addEventListener("click",()=>{ const f=chip.dataset.f; state[f]=!state[f]; chip.classList.toggle("on",state[f]); renderReset(); }); });
  const catbox=document.getElementById("cats");
  CATS.forEach(([k,label])=>{ const c=document.createElement("span"); c.className="chip"; c.textContent=label;
    c.onclick=()=>{ state.cats.has(k)?state.cats.delete(k):state.cats.add(k); c.classList.toggle("on"); renderReset(); }; catbox.appendChild(c); });

  let toastT; function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),1900); }

  // ---------- go ----------
  renderProjSel(); updateBlockedBtn(); updateHiddenBtn(); refreshPairbar();
  if(editorOpen){ editor.classList.add("on"); renderEditor(); }
  if(proj().bodyFont) loadFont(BY_NAME[proj().bodyFont]);
  renderReset();
})();
</script>
</body>
</html>
